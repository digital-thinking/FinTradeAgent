name: E2E Tests

on:
  push:
    branches: [ main, frontend/vue-migration ]
  pull_request:
    branches: [ main, frontend/vue-migration ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
          
      - name: Install Node.js dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install ${{ matrix.browser }} --with-deps
        
      - name: Start backend server
        run: |
          cd backend
          poetry run python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          # Wait for backend to be ready
          timeout 30 bash -c 'until curl -f http://localhost:8000/health; do sleep 1; done'
        env:
          PYTHONPATH: ${{ github.workspace }}
          
      - name: Start frontend server
        working-directory: ./frontend
        run: |
          npm run dev &
          # Wait for frontend to be ready
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 1; done'
          
      - name: Run E2E tests
        working-directory: ./frontend
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7
          
  e2e-mobile:
    name: E2E Mobile Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
          
      - name: Install Node.js dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps
        
      - name: Start backend server
        run: |
          cd backend
          poetry run python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          timeout 30 bash -c 'until curl -f http://localhost:8000/health; do sleep 1; done'
        env:
          PYTHONPATH: ${{ github.workspace }}
          
      - name: Start frontend server
        working-directory: ./frontend
        run: |
          npm run dev &
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 1; done'
          
      - name: Run Mobile E2E tests
        working-directory: ./frontend
        run: npx playwright test --project="Mobile Chrome" --project="Mobile Safari"
        env:
          CI: true
          
      - name: Upload mobile test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-results-mobile
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

  performance-tests:
    name: E2E Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
          cd frontend && npm ci
          
      - name: Install Playwright
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps
        
      - name: Start servers
        run: |
          # Start backend
          cd backend
          poetry run python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          cd ../frontend
          # Start frontend
          npm run dev &
          # Wait for both to be ready
          timeout 30 bash -c 'until curl -f http://localhost:8000/health && curl -f http://localhost:3000; do sleep 1; done'
        env:
          PYTHONPATH: ${{ github.workspace }}
          
      - name: Run performance tests
        working-directory: ./frontend
        run: npx playwright test cross-browser.spec.js --grep "Performance" --project=chromium
        env:
          CI: true
          
      - name: Upload performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-performance-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [e2e-tests, e2e-mobile]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/
          
      - name: Merge test results
        run: |
          mkdir -p merged-results
          find artifacts/ -name "*.json" -exec cp {} merged-results/ \;
          find artifacts/ -name "*.xml" -exec cp {} merged-results/ \;
          
      - name: Generate combined report
        run: |
          echo "# E2E Test Results" > test-summary.md
          echo "" >> test-summary.md
          echo "## Browser Test Results" >> test-summary.md
          
          for browser in chromium firefox webkit mobile; do
            if [ -d "artifacts/playwright-results-$browser" ]; then
              echo "### $browser" >> test-summary.md
              if [ -f "artifacts/playwright-results-$browser/results.json" ]; then
                echo "✅ Tests completed" >> test-summary.md
              else
                echo "❌ Tests failed or incomplete" >> test-summary.md
              fi
            fi
          done
          
      - name: Upload combined report
        uses: actions/upload-artifact@v3
        with:
          name: combined-test-report
          path: |
            merged-results/
            test-summary.md
          retention-days: 30
          
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('test-summary.md')) {
              const summary = fs.readFileSync('test-summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 🎭 E2E Test Results\n\n' + summary
              });
            }

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [e2e-tests, e2e-mobile, performance-tests]
    if: failure() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Notify Slack on failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          title: "🚨 E2E Tests Failed on Main Branch"
          text: |
            E2E tests failed on the main branch.
            
            **Repository:** ${{ github.repository }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            **Workflow:** ${{ github.workflow }}
            
            Please check the test results and fix any issues.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}