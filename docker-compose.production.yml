version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: fintradeagent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintradeagent_prod
      POSTGRES_USER: fintradeagent
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - fintradeagent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintradeagent -d fintradeagent_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: '0.5'

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fintradeagent-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fintradeagent-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --pass ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: '0.25'

  # FinTradeAgent Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fintradeagent-app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://fintradeagent:${DATABASE_PASSWORD}@db:5432/fintradeagent_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      - LOG_LEVEL=info
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/var/log/fintradeagent
      - app_data:/var/lib/fintradeagent
    networks:
      - fintradeagent-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: '1.0'

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.24-alpine
    container_name: fintradeagent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    networks:
      - fintradeagent-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: '0.25'

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fintradeagent-celery
    restart: unless-stopped
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://fintradeagent:${DATABASE_PASSWORD}@db:5432/fintradeagent_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/3
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
    volumes:
      - app_logs:/var/log/fintradeagent
      - app_data:/var/lib/fintradeagent
    networks:
      - fintradeagent-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: '0.5'

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fintradeagent-beat
    restart: unless-stopped
    command: celery -A backend.celery_app beat --loglevel=info --schedule=/var/lib/fintradeagent/celerybeat-schedule
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://fintradeagent:${DATABASE_PASSWORD}@db:5432/fintradeagent_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/3
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - app_logs:/var/log/fintradeagent
      - app_data:/var/lib/fintradeagent
    networks:
      - fintradeagent-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: '0.25'

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: fintradeagent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - fintradeagent-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: '0.5'

  # Grafana (dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: fintradeagent-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - fintradeagent-network
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: '0.25'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_data:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  fintradeagent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16